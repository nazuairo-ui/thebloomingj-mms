<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}The Blooming Journey MMS{% endblock %}</title>
    <meta name="description" content="Sistem Tiket Digital Kajian Offline MMS 2026">
    <link rel="icon" type="image/png" href="{{ url_for('static', filename='mms.png') }}">
    <link rel="apple-touch-icon" href="{{ url_for('static', filename='mms.png') }}">
    <link
        href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}" />
</head>

<body>

    <div class="scroll-progress" id="scrollBar"></div>

    <nav id="navbar">
        <div class="nav-logo">
            <img src="{{ url_for('static', filename='logo.png') }}" alt="logo"
                style="height: 36px; vertical-align: middle; margin-right: 8px;">
            <span class="logo-the">The</span>
            <span class="logo-bloom">Blooming Journey</span>
        </div>
    </nav>

    <section id="daftar">
        <div class="form-container">
            <h2>Form Pendaftaran</h2>
            <p class="form-subtitle">Isi data di bawah ini untuk mendaftar</p>
            <form id="registerForm">
                <div class="form-group">
                    <label for="nama">Nama Lengkap</label>
                    <input type="text" id="nama" name="nama" placeholder="Nama Lengkap" required>
                </div>
                <div class="form-group">
                    <label for="telp">No. Telepon</label>
                    <input type="tel" id="telp" name="telp" placeholder="Contoh: 08123456789" required>
                </div>
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email" placeholder="mms@email.com" required>
                </div>
                <div class="form-group">
                    <label for="bukti">Upload Bukti Transfer</label>
                    <input type="file" id="bukti" name="bukti" accept="image/*,.pdf" required>
                    <span class="file-hint">Format: JPG, PNG, atau PDF (max 3MB)</span>
                </div>
                <button type="submit" class="btn-submit">Daftar Sekarang</button>
            </form>
        </div>
    </section>
</body>

</html>
